name: Notify Dyno (Issue & Comment events)

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Post acknowledgment + notify Telegram
        run: |
          GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          ISSUE_NUM="${{ github.event.issue.number }}"
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_URL="${{ github.event.issue.html_url }}"
          SENDER="${{ github.event.sender.login }}"
          BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}"

          if [ "${{ github.event_name }}" = "issues" ] && [ "${{ github.event.action }}" = "opened" ]; then
            # Post acknowledgment comment on the issue
            curl -s -X POST "https://api.github.com/repos/${{ github.repository }}/issues/${ISSUE_NUM}/comments" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Content-Type: application/json" \
              -d '{"body": "Looking into it 👀"}'

            # Notify Telegram group
            MSG="🐛 *New GitHub Issue #${ISSUE_NUM}*%0A*${ISSUE_TITLE}*%0ABy: ${SENDER}%0A${ISSUE_URL}"
            curl -s "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${MSG}&parse_mode=Markdown"

          elif [ "${{ github.event_name }}" = "issue_comment" ]; then
            COMMENT="${{ github.event.comment.body }}"
            # Notify Telegram group about the comment
            MSG="💬 *Comment on Issue #${ISSUE_NUM}*%0A*${ISSUE_TITLE}*%0ABy: ${SENDER}%0A\"${COMMENT}\"%0A${ISSUE_URL}"
            curl -s "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${MSG}&parse_mode=Markdown"
          fi
