name: Notify Dyno (Issue & Comment events)

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Build payload and notify OpenClaw
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            PAYLOAD=$(jq -n \
              --arg action "issue_comment.created" \
              --arg issue_number "${{ github.event.issue.number }}" \
              --arg issue_title "${{ github.event.issue.title }}" \
              --arg issue_url "${{ github.event.issue.html_url }}" \
              --arg sender "${{ github.event.sender.login }}" \
              --arg comment "${{ github.event.comment.body }}" \
              '{action: $action, issue: {number: $issue_number, title: $issue_title, html_url: $issue_url, user: {login: $sender}}, comment: {body: $comment, user: {login: $sender}}}')
          else
            PAYLOAD=$(jq -n \
              --arg action "${{ github.event.action }}" \
              --arg issue_number "${{ github.event.issue.number }}" \
              --arg issue_title "${{ github.event.issue.title }}" \
              --arg issue_url "${{ github.event.issue.html_url }}" \
              --arg issue_body "${{ github.event.issue.body }}" \
              --arg sender "${{ github.event.sender.login }}" \
              '{action: $action, issue: {number: $issue_number, title: $issue_title, html_url: $issue_url, body: $issue_body, user: {login: $sender}}}')
          fi

          echo "Sending payload to OpenClaw..."
          curl -s --max-time 10 -w "\nHTTP %{http_code}" \
            -X POST "${{ secrets.OPENCLAW_HOOKS_URL }}/hooks/github-issues" \
            -H "Authorization: Bearer ${{ secrets.OPENCLAW_HOOKS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
